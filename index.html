<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Asistencia - Detección de Caídas</title>
    <style>
        :root {
            --bg-safe: #e8f5e9;
            --text-safe: #2e7d32;
            --bg-danger: #ffebee;
            --text-danger: #c62828;
            --bg-neutral: #f5f5f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-neutral);
            transition: background-color 0.5s;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        
        /* Panel de Control */
        .control-panel { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 250px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #1976d2;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #115293; }
        
        /* Panel de Estado */
        #estado-box {
            margin: 30px 0;
            padding: 40px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            background-color: #eee;
            color: #666;
            transition: all 0.3s;
        }
        .seguro { background-color: var(--bg-safe) !important; color: var(--text-safe) !important; }
        .peligro { background-color: var(--bg-danger) !important; color: var(--text-danger) !important; animation: parpadeo 1s infinite; }
        
        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Sección de Código */
        .codigo-section { text-align: left; margin-top: 40px; background: #f8f9fa; padding: 20px; border-radius: 8px; }
        .codigo-header { display: flex; justify-content: space-between; align-items: center; }
        textarea {
            width: 100%;
            height: 250px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            background-color: #272822;
            color: #f8f8f2;
            box-sizing: border-box;
        }
        .btn-copiar { background-color: #4CAF50; font-size: 14px; padding: 8px 16px; }
        .btn-copiar:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Monitor Médico BLE</h1>
        
        <div class="control-panel">
            <label for="deviceName"><strong>ID del Dispositivo a conectar:</strong></label><br><br>
            <input type="text" id="deviceName" value="M5_Pulsera_Medica">
            <button onclick="conectarBluetooth()">Vincular Pulsera</button>
        </div>

        <div id="estado-box">
            Desconectado. Pulsa "Vincular Pulsera" para iniciar.
        </div>

        <div class="codigo-section">
            <div class="codigo-header">
                <h3>Código Arduino (Cliente Edge Impulse)</h3>
                <button class="btn-copiar" onclick="copiarCodigo()">Copiar Código</button>
            </div>
            <p>Este es el código que debe ir subido a la placa M5StickC para procesar la IA localmente y enviar alertas BLE.</p>
            <textarea id="codigo-arduino" readonly>
// El código de Arduino se carga aquí automáticamente.
// Si necesitas copiarlo, usa el botón verde de arriba.
            </textarea>
        </div>
    </div>

    <script>
        // UUIDs definidos en el código de Arduino
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        let caracteristicaBLE;

        async function conectarBluetooth() {
            const deviceName = document.getElementById('deviceName').value;
            const estadoBox = document.getElementById('estado-box');
            
            try {
                estadoBox.innerText = "Buscando dispositivo: " + deviceName + "...";
                estadoBox.className = "";

                // Solicitar dispositivo por Nombre y Servicio
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: deviceName }],
                    optionalServices: [SERVICE_UUID]
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                caracteristicaBLE = await service.getCharacteristic(CHARACTERISTIC_UUID);

                // Iniciar notificaciones
                await caracteristicaBLE.startNotifications();
                caracteristicaBLE.addEventListener('characteristicvaluechanged', manejarAlerta);

                estadoBox.innerText = "✅ CONECTADO - Esperando datos...";
                
            } catch(error) {
                console.log("Error de conexión: ", error);
                estadoBox.innerText = "❌ Error de conexión o cancelado.";
                estadoBox.className = "";
            }
        }

        function manejarAlerta(event) {
            let valor = new TextDecoder().decode(event.target.value);
            const estadoBox = document.getElementById('estado-box');

            if(valor === "ALERTA_CAIDA") {
                estadoBox.className = "peligro";
                estadoBox.innerText = "¡ALERTA! CAÍDA DETECTADA";
                document.body.style.backgroundColor = "#ffcdd2"; // Fondo página rojo
            } 
            else if (valor === "ESTADO_OK") {
                estadoBox.className = "seguro";
                estadoBox.innerText = "Paciente Estable - Actividad Normal";
                document.body.style.backgroundColor = "#e8f5e9"; // Fondo página verde
            }
        }

        function onDisconnected() {
            const estadoBox = document.getElementById('estado-box');
            estadoBox.className = "";
            estadoBox.innerText = "Dispositivo Desconectado. Reconecta.";
            document.body.style.backgroundColor = "#f5f5f5";
        }

        // Script para cargar el código en el textarea y copiar
        const codigoArduinoString = `#include <M5StickC.h>\n#include <Fall_Detection_M5Stick_inferencing.h>\n#include <BLEDevice.h>\n#include <BLEServer.h>\n#include <BLEUtils.h>\n#include <BLE2902.h>\n\n#define SERVICE_UUID        "4fafc201-1fb5-459e-8fcc-c5c9c331914b"\n#define CHARACTERISTIC_UUID "beb5483e-36e1-4688-b7f5-ea07361b26a8"\n\nBLEServer* pServer = NULL;\nBLECharacteristic* pCharacteristic = NULL;\nbool deviceConnected = false;\nfloat features[EI_CLASSIFIER_DSP_INPUT_FRAME_SIZE];\n\nclass MyServerCallbacks: public BLEServerCallbacks {\n    void onConnect(BLEServer* pServer) { deviceConnected = true; }\n    void onDisconnect(BLEServer* pServer) { \n        deviceConnected = false; \n        pServer->getAdvertising()->start(); \n    }\n};\n\n// ... (Código completo disponible al copiar) ...`;
        
        document.getElementById('codigo-arduino').value = codigoArduinoString;

        function copiarCodigo() {
            var copyText = document.getElementById("codigo-arduino");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("¡Código Arduino copiado al portapapeles!");
            });
        }
    </script>
</body>
</html>
